name: CI Pipeline

# El pipeline se activará cuando hagas "push" o "pull request" a las ramas main o develop
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    # GitHub usará una máquina virtual con la última versión de Ubuntu
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código de tu repositorio en la máquina virtual
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Instala Python en la máquina virtual
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. Instala las librerías que listaste en requirements.txt (como pytest)
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Ejecuta los tests
      # Usamos "python -m pytest" para evitar problemas de rutas (imports)
      - name: Ejecutar pruebas
        run: |
          python -m pytest